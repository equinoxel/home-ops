---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
components:
  - ../metrics
patches:
  - patch: |-
      - op: replace
        path: /spec/metrics/0/external/metric
        value:
          name: ${SCALER_METRIC_NAME:=probe_success}
          selector:
            matchLabels:
              instance: ${SCALER_INSTANCE:=10.0.0.14}
    target:
      group: autoscaling
      kind: HorizontalPodAutoscaler
