---
# yaml-language-server: $schema=https://schemas.tholinka.dev/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: autobrr
  annotations:
    gethomepage.dev/enabled: 'true'
    gethomepage.dev/icon: autobrr.svg
    gethomepage.dev/name: Autobrr
    gethomepage.dev/group: Media
    gethomepage.dev/app: autobrr
spec:
  hostnames:
    - autobrr.laurivan.com
  parentRefs:
    - name: envoy-internal
      namespace: network
  rules:
    - backendRefs:
        - name: autobrr
          port: 80
