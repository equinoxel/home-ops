---
# yaml-language-server: $schema=https://schemas.tholinka.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app bookorbit
  namespace: &namespace media
spec:
  interval: 1h
  components:
    - ../../../../components/cnpg/app
    - ../../../../components/volsync
  dependsOn:
    - name: postgres-cluster
      namespace: database
  path: ./kubernetes/apps/media/bookorbit/app
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CAPACITY: 1Gi
      DATABASE_EXTENSIONS: '[{"name":"uuid-ossp"},{"name":"pg_trgm"},{"name":"vector"}]'
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
  wait: true
