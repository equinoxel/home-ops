---
# yaml-language-server: $schema=https://schemas.tholinka.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &secret bookorbit
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  target:
    name: *secret
    template:
      data:
        DATABASE_URL: 'postgres://{{ .DATABASE_USERNAME }}:{{ .DATABASE_PASSWORD }}@postgres-cluster-rw.database.svc.cluster.local:5432/bookorbit'
        JWT_SECRET: '{{ .JWT_SECRET }}'
        SETUP_BOOTSTRAP_TOKEN: '{{ .SETUP_BOOTSTRAP_TOKEN }}'
  dataFrom:
    - extract:
        key: *secret
