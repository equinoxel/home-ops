---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app bookorbit
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: 'true'
        containers:
          app:
            image:
              repository: ghcr.io/bookorbit/bookorbit
              tag: latest
            env:
              TZ: Europe/Bucharest
              PUID: '1000'
              PGID: '1000'
              APP_URL: https://bookorbit.laurivan.com
              APP_PORT: '3000'
              PORT: '3000'
              BOOKORBIT_FIX_PERMISSIONS: 'true'
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: '{{ .Release.Name }}-postgres'
                    key: url
            envFrom:
              - secretRef:
                  name: '{{ .Release.Name }}'
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3000
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3000
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: 3000
    route:
      app:
        hostnames:
          - '{{ .Release.Name }}.laurivan.com'
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      data:
        existingClaim: '{{ .Release.Name }}'
        globalMounts:
          - path: /data
      books:
        type: nfs
        server: 10.0.0.14
        path: /mnt/Main/shares/books
        globalMounts:
          - path: /books
      postgres-certs:
        type: secret
        name: postgres-bookorbit-cert
        defaultMode: 0440
        globalMounts:
          - path: /var/run/secrets/postgresql
