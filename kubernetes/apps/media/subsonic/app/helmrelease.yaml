---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: subsonic
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: subsonic

  values:
    controllers:
      subsonic:
        initContainers:
          init-dirs:
            image:
              repository: docker.io/busybox
              tag: latest
            command:
              - /bin/sh
              - -c
              - mkdir -p /data/cache /data/playlists
        containers:
          gonic:
            image:
              repository: ghcr.io/sentriz/gonic
              tag: v0.20.1
            env:
              GONIC_MUSIC_PATH: /music
              GONIC_PODCAST_PATH: /podcasts
              GONIC_CACHE_PATH: /data/cache
              GONIC_DB_PATH: /data/gonic.db
              GONIC_LISTEN_ADDR: ":4747"
              GONIC_SCAN_INTERVAL: "30"
              GONIC_SCAN_AT_START_ENABLED: "true"

            resources:
              requests:
                cpu: 20m
                memory: 256Mi
              limits:
                memory: 1Gi

            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}

    defaultPodOptions:
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1003
        runAsGroup: 1005
        fsGroup: 1005
        fsGroupChangePolicy: "OnRootMismatch"

    service:
      app:
        ports:
          http:
            port: 4747

    route:
      home:
        hostnames: ["subsonic.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network

    persistence:
      data:
        existingClaim: ${APP}
        globalMounts:
          - path: /data
      music:
        type: nfs
        server: 10.0.0.14
        path: /mnt/Main/shares/audio
        globalMounts:
          - path: /music
            readOnly: true
      podcasts:
        type: nfs
        server: 10.0.0.14
        path: /mnt/Main/shares/podcasts
        globalMounts:
          - path: /data/podcasts
