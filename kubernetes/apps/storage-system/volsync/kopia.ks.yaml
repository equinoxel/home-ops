---
# yaml-language-server: $schema=https://schemas.tholinka.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app kopia
  namespace: &namespace storage-system
spec:
  interval: 1h
  components:
    - ../../../../components/scaler/instance
    - ../../../../components/ext-auth
    - ../../../../components/ext-auth/two
  dependsOn:
    - name: keda
      namespace: observability
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: *app
      namespace: *namespace
  path: ./kubernetes/apps/storage-system/volsync/kopia
  postBuild:
    substitute:
      APP: *app
      EXT_AUTH_TARGET_2: kopia-s3
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
