---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
spec:
  chart:
    spec:
      chart: headlamp
      version: "0.41.0"
      sourceRef:
        kind: HelmRepository
        name: headlamp
  interval: 1h
  values:
    config:
      watchPlugins: true
    pluginsManager:
      enabled: true
      configContent: |
        plugins:
          - name: flux
            source: https://artifacthub.io/packages/headlamp/headlamp-flux/flux
            version: 0.1.1
        installOptions:
          parallel: true
