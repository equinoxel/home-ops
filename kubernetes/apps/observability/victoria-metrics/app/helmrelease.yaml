---
# yaml-language-server: $schema=https://schemas.tholinka.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app victoria-metrics
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    fullnameOverride: *app
    global:
      image:
        registry: quay.io
    alertmanager:
      config:
        route:
          receiver: heartbeat
          repeat_interval: 12h
          routes:
            - receiver: blackhole
              matchers:
                - alertname = InfoInhibitor
            - receiver: heartbeat
              matchers:
                - alertname = "Watchdog"
              group_interval: 5m
              group_wait: 0s
              repeat_interval: 5m
          group_by:
            - alertname
            - cluster
            - job
          group_interval: 5m
          group_wait: 1m
        inhibit_rules:
          - equal:
              - alertname
              - namespace
            source_matchers:
              - severity = "critical"
            target_matchers:
              - severity = "warning"
        receivers:
          - name: blackhole
          - name: heartbeat
            webhook_configs:
              - url_secret:
                  name: &secret vmalertmanager
                  key: HEALTHCHECKS_IO_HEARTBEAT_URL
      route:
        enabled: true
        annotations:
          gethomepage.dev/enabled: 'true'
          gethomepage.dev/group: Observability
          gethomepage.dev/name: Victoria Metrics Alertmanager
          gethomepage.dev/icon: alertmanager.svg
          gethomepage.dev/pod-selector: app.kubernetes.io/name=vmalertmanager
        hostnames:
          - alertmanager.laurivan.com
        parentRefs:
          - name: envoy-internal
            namespace: network
      spec:
        externalURL: https://alertmanager.laurivan.com
        image:
          repository: quay.io/prometheus/alertmanager
        securityContext:
          runAsGroup: 2000
          runAsNonRoot: true
          runAsUser: 1000
          fsGroup: 2000
      useManagedConfig: true
    defaultDashboards:
      grafanaOperator:
        enabled: true
        spec:
          allowCrossNamespaceImport: true
    defaultDatasources:
      grafanaOperator:
        enabled: true
        spec:
          allowCrossNamespaceImport: true
    grafana:
      enabled: false
      forceDeployDatasource: true
    kube-state-metrics:
      enabled: false
    kubeControllerManager:
      vmScrape:
        spec:
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: http-metrics
              scheme: https
              tlsConfig:
                insecureSkipVerify: true
    kubeEtcd:
      service:
        selector:
          component: kube-apiserver
        port: 2381
        targetPort: 2381
      vmScrape:
        spec:
          endpoints:
            - scheme: http
    kubeScheduler:
      vmScrape:
        spec:
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: http-metrics
              scheme: https
              tlsConfig:
                insecureSkipVerify: true
    prometheus-node-exporter:
      enabled: false
    victoria-metrics-operator:
      admissionWebhooks:
        policy: Ignore
      crds:
        cleanup:
          enabled: false
      operator:
        enable_converter_ownership: true
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 128Mi
    vmagent:
      spec:
        scrapeInterval: 60s
        extraArgs:
          promscrape.dropOriginalLabels: 'true'
          promscrape.maxScrapeSize: 50MiB
          promscrape.streamParse: 'true'
        resources:
          requests:
            cpu: 100m
          limits:
            cpu: 500m
    vmalert:
      spec:
        evaluationInterval: 60s
        extraArgs:
          external.url: https://alerts.laurivan.com
        datasource:
          url: http://vmauth-victoria-metrics.observability.svc.cluster.local:8427
      route:
        enabled: true
        annotations:
          gethomepage.dev/enabled: 'true'
          gethomepage.dev/group: Observability
          gethomepage.dev/name: Victoria Metrics Alerts
          gethomepage.dev/icon: victoriametrics.svg
          gethomepage.dev/pod-selector: app.kubernetes.io/name=vmalert
        hostnames:
          - alerts.laurivan.com
        parentRefs:
          - name: envoy-internal
            namespace: network
    vmauth:
      enabled: true
      spec:
        extraArgs:
          requestBufferSize: '65536'
        unauthorizedUserAccessSpec:
          url_map:
            - src_paths:
                - /api/v1/query.*
                - /api/v1/label/.*
                - /api/v1/series.*
                - /api/v1/metadata.*
                - /api/v1/status.*
                - /api/v1/targets.*
              url_prefix: http://vmsingle-victoria-metrics.observability.svc.cluster.local:8428
            - src_paths:
                - /select/logsql/.*
              url_prefix: http://victoria-logs.observability.svc.cluster.local:9428
    vmsingle:
      route:
        annotations:
          gethomepage.dev/enabled: 'true'
          gethomepage.dev/group: Observability
          gethomepage.dev/name: Victoria Metrics
          gethomepage.dev/icon: victoriametrics.svg
          gethomepage.dev/pod-selector: app.kubernetes.io/name=vmsingle
        enabled: true
        hostnames:
          - metrics.laurivan.com
        parentRefs:
          - name: envoy-internal
            namespace: network
      spec:
        # Reduced from 90d to 30d to lower compaction overhead and memory usage
        retentionPeriod: 30d
        extraArgs:
          search.maxLabelsAPIDuration: 30s
          search.maxQueryDuration: 60s
        storage:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 50Gi
          storageClassName: openebs-hostpath
    additionalVictoriaMetricsMap:
      dockerhub-rules:
        create: true
        groups:
          - name: dockerhub
            rules:
              - alert: DockerhubRateLimitRisk
                annotations:
                  summary: There are {{ $value }} containers pulling from Dockerhub. This may lead to rate limiting.
                expr: count(time() - container_last_seen{image=~"(docker.io).*",container!=""} < 30) > 100
                labels:
                  severity: critical
      oom-rules:
        create: true
        groups:
          - name: oom
            rules:
              - alert: OomKilled
                annotations:
                  summary: Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been OOMKilled {{ $value }} times in the last 10 minutes.
                expr: (kube_pod_container_status_restarts_total - kube_pod_container_status_restarts_total offset 10m >= 1) and ignoring (reason) min_over_time(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[10m]) == 1
                labels:
                  severity: critical
      btrfs-rules:
        groups:
          - name: btrfs
            rules:
              - alert: BtrfsDeviceErrorsDetected
                annotations:
                  sumamry: BTRFS device {{$labels.device}} on {{$labels.kubernetes_node}}@{{$labels.instance}} detected an error of type {{$labels.type}}
                expr: node_btrfs_device_errors_total > 0
                labels:
                  severity: critical
              - alert: BtrfsDeviceAlmostFull
                annotations:
                  summary: BTRFS device {{$labels.device}}@{{$labels.instance}} has less than 1% of free space left
                expr: (node_btrfs_device_unused_bytes{job="node-exporter"} / node_btrfs_device_size_bytes{job="node-exporter"} * 100) < 1
                labels:
                  severity: critical
