---
# From https://github.com/tholinka/home-ops/blob/f537ab2ac52ffd3730cdee1b3c448a7267fd2cc2/kubernetes/apps/self-hosted/homepage/app/config/services.yaml

- Media:
    # TODO: uncomment after creating autobrr Bitwarden key with AUTOBRR_HOMEPAGE_API_KEY
    # - Autobrr:
    #     widget:
    #       type: autobrr
    #       url: http://autobrr.media.svc.cluster.local
    #       key: '{{HOMEPAGE_VAR_AUTOBRR_TOKEN}}'
    - Navidrome:
        widget:
          type: navidrome
          url: http://navidrome.media.svc.cluster.local:4533
          user: '{{HOMEPAGE_VAR_NAVIDROME_USER}}'
          token: '{{HOMEPAGE_VAR_NAVIDROME_TOKEN}}'
          salt: '{{HOMEPAGE_VAR_NAVIDROME_SALT}}'

- Infrastructure:
    - Unifi:
        icon: unifi.svg
        href: https://router.internal
        #description: Unifi Network Application
        namespace: network



- Calendar:
    - Agenda:
        widget:
          type: calendar
          view: agenda # optional - possible values monthly, agenda
          maxEvents: 5 # optional - defaults to 10
          integrations: # optional
            - type: sonarr # active widget type that is currently enabled on homepage - possible values: radarr, sonarr, lidarr, readarr, ical
              service_group: Media # group name where widget exists
              service_name: Sonarr # service name for that widget
            - type: radarr # active widget type that is currently enabled on homepage - possible values: radarr, sonarr, lidarr, readarr, ical
              service_group: Media # group name where widget exists
              service_name: Radarr # service name for that widget