---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ghost-laur
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: docker.io/library/ghost
              tag: 5.119.3-alpine
            env:
              NODE_ENV: production
              url: https://www.laurivan.com
              database__client: mysql2
              database__connection__host: mariadb.database.svc.cluster.local
              database__connection__port: "3306"
              database__connection__user: ghost
              database__connection__password: gh0st_db_p4ss
              database__connection__database: ghost
              database__connection__charset: utf8mb4
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}"
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 2368
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 60
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ghost/api/admin/site/
                    port: *port
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
            resources:
              requests:
                cpu: 25m
                memory: 256Mi
              limits:
                memory: 2Gi
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "www.laurivan.com"
        parentRefs:
          - name: envoy-external
            namespace: network
    persistence:
      content:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /var/lib/ghost/content
