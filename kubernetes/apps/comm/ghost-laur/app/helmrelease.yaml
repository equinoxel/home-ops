---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ghost-laur
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        initContainers:
          init-wal:
            image:
              repository: docker.io/library/alpine
              tag: "3.22"
            command:
              - sh
              - -c
              - |
                apk add --no-cache sqlite > /dev/null 2>&1
                DB="/var/lib/ghost/content/data/ghost.db"
                if [ -f "$DB" ]; then
                  sqlite3 "$DB" "PRAGMA journal_mode=WAL; PRAGMA synchronous=NORMAL;"
                  echo "SQLite WAL mode enabled"
                else
                  echo "DB not found yet, skipping"
                fi
        containers:
          app:
            image:
              repository: docker.io/library/ghost
              tag: 5.119.3-alpine
            env:
              NODE_ENV: production
              url: https://www.laurivan.com
              database__client: sqlite3
              database__connection__filename: /var/lib/ghost/content/data/ghost.db
              database__useNullAsDefault: "true"
              database__acquireConnectionTimeout: "120000"
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}"
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 2368
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 30
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ghost/api/admin/site/
                    port: *port
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 25m
                memory: 256Mi
              limits:
                memory: 1Gi
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "www.laurivan.com"
        parentRefs:
          - name: envoy-external
            namespace: network
    persistence:
      content:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /var/lib/ghost/content
