---
# yaml-language-server: $schema=https://schemas.tholinka.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: shlink-web
  namespace: &namespace comm
spec:
  interval: 1h
  dependsOn:
    - name: shlink
      namespace: comm
  path: ./kubernetes/apps/comm/shlink/web
  postBuild:
    substitute:
      APP: shlink-web
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
  wait: true
