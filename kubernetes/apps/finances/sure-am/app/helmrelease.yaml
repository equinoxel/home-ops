---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app sure-am
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/we-promise/sure
              tag: stable
            env:
              SELF_HOSTED: "true"
              RAILS_FORCE_SSL: "false"
              RAILS_ASSUME_SSL: "true"
              DB_HOST: postgres-cluster-rw.database.svc.cluster.local
              DB_PORT: "5432"
              POSTGRES_DB: sure-am
              POSTGRES_USER: sure-am
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: "{{ .Release.Name }}-postgres"
                    key: url
              REDIS_URL: redis://sure-am-dragonfly:6379
              AUTH_PROVIDERS_SOURCE: db
              AUTH_LOCAL_LOGIN_ENABLED: "true"
              AUTH_LOCAL_ADMIN_OVERRIDE_ENABLED: "true"
              AUTH_JIT_MODE: create_and_link
              OIDC_AUTHENTIK_ISSUER: https://auth.laurivan.com/application/o/sure-am/
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}"
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 3000
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
          worker:
            image:
              repository: ghcr.io/we-promise/sure
              tag: stable
            command:
              - bundle
              - exec
              - sidekiq
            env:
              SELF_HOSTED: "true"
              DB_HOST: postgres-cluster-rw.database.svc.cluster.local
              DB_PORT: "5432"
              POSTGRES_DB: sure-am
              POSTGRES_USER: sure-am
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: "{{ .Release.Name }}-postgres"
                    key: url
              REDIS_URL: redis://sure-am-dragonfly:6379
              AUTH_PROVIDERS_SOURCE: db
              OIDC_AUTHENTIK_ISSUER: https://auth.laurivan.com/application/o/sure-am/
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}"
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "sure.laurivan.com"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      storage:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /rails/storage
      postgres-certs:
        type: secret
        name: postgres-sure-am-cert
        defaultMode: 0440
        globalMounts:
          - path: /var/run/secrets/postgresql
