---
# yaml-language-server: $schema=https://schemas.tholinka.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app sure-am
  namespace: &namespace finances
spec:
  interval: 1h
  components:
    - ../../../../components/cnpg/app
    - ../../../../components/dragonfly/own-cluster
    - ../../../../components/volsync
  dependsOn:
    - name: postgres-cluster
      namespace: database
    - name: dragonfly-operator
      namespace: database
  healthCheckExprs:
    - apiVersion: dragonflydb.io/v1alpha1
      kind: Dragonfly
      failed: status.phase != 'ready'
      current: status.phase == 'ready'
  path: ./kubernetes/apps/finances/sure-am/app
  patches:
    - target:
        kind: Dragonfly
        name: sure-am-dragonfly
      patch: |
        - op: replace
          path: /spec/replicas
          value: 1
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CAPACITY: 5Gi
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
  wait: true
