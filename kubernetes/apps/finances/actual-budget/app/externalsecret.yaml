---
# yaml-language-server: $schema=https://schemas.tholinka.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name actual-budget
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  target:
    name: *name
    template:
      data:
        ACTUAL_OPENID_CLIENT_ID: '{{ .OPENID_CLIENT_ID }}'
        ACTUAL_OPENID_CLIENT_SECRET: '{{ .OPENID_CLIENT_SECRET }}'
  dataFrom:
    - extract:
        key: *name
