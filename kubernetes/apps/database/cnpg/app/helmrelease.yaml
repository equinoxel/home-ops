---
# yaml-language-server: $schema=https://flux.tholinka.dev/helmrelease/v2/github/cloudnative-pg/charts/main/charts/cloudnative-pg
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name cnpg
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *name
  values:
    crds:
      create: true
    resources:
      requests:
        cpu: 10m
        memory: 128Mi
      limits:
        memory: 256Mi
    monitoring:
      podMonitorEnabled: true
      grafanaDashboard:
        create: true
