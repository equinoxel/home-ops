---
# yaml-language-server: $schema=https://schemas.tholinka.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app postgres-cluster
  namespace: &namespace database
spec:
  interval: 1h
  path: ./kubernetes/apps/database/cnpg/cluster
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  dependsOn:
    - name: cnpg-crds
      namespace: database
    - name: openebs
      namespace: storage-system
  postBuild:
    substitute:
      APP: cluster
      CNPG_IMAGE: ghcr.io/cloudnative-pg/postgresql:18.4-standard-trixie@sha256:58c9a9e29a23b814f8f335ce178727d83bc40d96ed7fe8977192d2d8cdcb3927
      # Changed from 2 to 1: single worker node, resource constrained
      CNPG_REPLICAS: "1"
      CNPG_SIZE: 5Gi
      # Changed from 1Gi: hugepages not available on blade nodes
      CNPG_LIMITS_MEMORY_HUGEPAGES: "0"
      # Changed from 2Gi: reduce memory footprint for homelab
      CNPG_LIMITS_MEMORY: 512Mi
      # Changed from 500m: reduce CPU request for homelab
      CNPG_REQUESTS_CPU: 100m
      # Original values
      #CNPG_LIMITS_MEMORY_HUGEPAGES: 1Gi
      #CNPG_LIMITS_MEMORY: 2Gi
    substituteFrom:
      - kind: Secret
        name: cnpg-objectstore-substitute
        optional: false
  healthChecks:
    - apiVersion: &postgresVersion postgresql.cnpg.io/v1
      kind: &postgresKind Cluster
      name: *app
      namespace: *namespace
  healthCheckExprs:
    - apiVersion: *postgresVersion
      kind: *postgresKind
      failed: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'False')
      current: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'True')
