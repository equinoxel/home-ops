---
# yaml-language-server: $schema=https://schemas.tholinka.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: laurivan-com-tls
spec:
  refreshPolicy: CreatedOnce
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  target:
    name: laurivan-com-tls
    creationPolicy: Orphan
    template:
      type: kubernetes.io/tls
      metadata:
        annotations:
          cert-manager.io/alt-names: '*.laurivan.com,laurivan.com'
          cert-manager.io/certificate-name: laurivan-com
          cert-manager.io/common-name: ''
          cert-manager.io/ip-sans: ''
          cert-manager.io/issuer-group: ''
          cert-manager.io/issuer-kind: ClusterIssuer
          cert-manager.io/issuer-name: letsencrypt
          cert-manager.io/uri-sans: ''
        labels:
          controller.cert-manager.io/fao: 'true'
  dataFrom:
    - extract:
        key: lets_encrypt_tls
        decodingStrategy: Base64