---
# yaml-language-server: $schema=https://schemas.tholinka.dev/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: laurivan-com
spec:
  secretName: 'laurivan-com-tls'
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - laurivan.com
    - '*.laurivan.com'
  usages:
    - 'digital signature'