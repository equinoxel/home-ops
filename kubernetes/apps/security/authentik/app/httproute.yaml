---
# yaml-language-server: $schema=https://schemas.tholinka.dev/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik
  annotations:
    # Homepage discovery disabled — managed via services.yaml instead
    #gethomepage.dev/description: OIDC User Management
spec:
  hostnames: ["authentik.laurivan.com", "auth.laurivan.com"]
  parentRefs:
    - name: envoy-external
      namespace: network
  rules:
    - backendRefs:
        - name: authentik-server
          port: 80
