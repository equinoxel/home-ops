---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

tasks:
  restore:
    desc: Restore an app from a specific VolSync backup [APP=required] [TYPE=nfs|s3] [DATE=timestamp or snapshot hash]
    summary: |
      Restores an application's PVC from a VolSync/Kopia backup. You can specify
      either a date (restores the latest snapshot BEFORE that date) or a snapshot
      hash (restores that exact snapshot).

      The task will:
        1. Connect to the Kopia repository (NFS or S3)
        2. List snapshots for the app and find the target
        3. Scale down the app
        4. Delete and recreate the PVC + ReplicationDestination
        5. Trigger a restore from the identified snapshot
        6. Scale the app back up

      Examples:
        task volsync:restore APP=pgadmin TYPE=nfs DATE=2026-05-10
        task volsync:restore APP=autobrr TYPE=s3 DATE=2026-05-09T12:00:00
        task volsync:restore APP=forgejo TYPE=nfs DATE=2026-06-09T20:02:54.166268232Z
        task volsync:restore APP=forgejo TYPE=nfs DATE=e6136beca74f49b82f9e8580d27395be
    cmd: '{{.SCRIPTS_DIR}}/volsync-restore.sh {{.APP}} {{.TYPE}} {{.DATE}}'
    requires:
      vars: [APP, TYPE, DATE]
    preconditions:
      - test -f {{.SCRIPTS_DIR}}/volsync-restore.sh
      - which kubectl flux
      - sh: '[ "{{.TYPE}}" = "nfs" ] || [ "{{.TYPE}}" = "s3" ]'
        msg: "TYPE must be 'nfs' or 's3'"

  list-snapshots:
    desc: List available Kopia snapshots for an app [APP=required] [TYPE=nfs|s3]
    cmd: '{{.SCRIPTS_DIR}}/volsync-restore.sh {{.APP}} {{.TYPE}} --list-only'
    requires:
      vars: [APP, TYPE]
    preconditions:
      - test -f {{.SCRIPTS_DIR}}/volsync-restore.sh
      - which kubectl
      - sh: '[ "{{.TYPE}}" = "nfs" ] || [ "{{.TYPE}}" = "s3" ]'
        msg: "TYPE must be 'nfs' or 's3'"

  remove:
    desc: Remove snapshots AFTER a timestamp from both NFS and S3 [APP=required] [TIMESTAMP=YYYY-MM-DD|ISO8601] [DRY_RUN=--dry-run]
    summary: |
      Removes all VolSync/Kopia snapshots that are strictly AFTER the given
      timestamp from BOTH NFS and S3 repositories. The snapshot at the exact
      timestamp is preserved.

      The task will:
        1. Connect to the NFS Kopia repository
        2. List and remove snapshots after TIMESTAMP
        3. Connect to the S3 Kopia repository
        4. List and remove snapshots after TIMESTAMP

      Use DRY_RUN=--dry-run to preview what would be removed without deleting.

      Examples:
        task volsync:remove APP=forgejo TIMESTAMP=2026-06-01
        task volsync:remove APP=forgejo TIMESTAMP=2026-06-01T12:00:00
        task volsync:remove APP=forgejo TIMESTAMP=2026-06-10T10:01:21.157458582Z
        task volsync:remove APP=forgejo TIMESTAMP=2026-06-01 DRY_RUN=--dry-run
    cmd: '{{.SCRIPTS_DIR}}/volsync-remove.sh {{.APP}} {{.TIMESTAMP}} {{.DRY_RUN}}'
    requires:
      vars: [APP, TIMESTAMP]
    vars:
      DRY_RUN: '{{.DRY_RUN | default ""}}'
    preconditions:
      - test -f {{.SCRIPTS_DIR}}/volsync-remove.sh
      - which kubectl jq
