---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

tasks:
  browse-pvc:
    desc: Mount a PVC to an temp container [NS=default] [CLAIM=required]
    interactive: true
    cmd: kubectl browse-pvc --namespace {{.NS}} --image docker.io/library/alpine:latest {{.CLAIM}}
    vars:
      NS: '{{.NS | default "default"}}'
    requires:
      vars: [CLAIM]
    preconditions:
      - kubectl --namespace {{.NS}} get persistentvolumeclaims {{.CLAIM}}
      - kubectl browse-pvc --version
      - which kubectl

  node-shell:
    desc: Open a shell to a node [NODE=required]
    interactive: true
    cmd: kubectl node-shell -n kube-system -x {{.NODE}}
    requires:
      vars: [NODE]
    preconditions:
      - kubectl get nodes {{.NODE}}
      - kubectl node-shell --version
      - which kubectl

  sync-secrets:
    desc: Sync all ExternalSecrets
    cmds:
      - for: { var: SECRETS, split: \n }
        cmd: echo "{{.ITEM}}" && kubectl --namespace {{splitList "," .ITEM | first}} annotate externalsecret {{splitList "," .ITEM | last}} force-sync="{{now | unixEpoch}}" --overwrite
    vars:
      SECRETS:
        sh: kubectl get externalsecret --all-namespaces --no-headers --output=jsonpath='{range .items[*]}{.metadata.namespace},{.metadata.name}{"\n"}{end}'
    preconditions:
      - which kubectl

  cleanse-pods:
    desc: Cleanse pods with a Failed/Pending/Succeeded phase
    cmds:
      - for:
          matrix:
            PHASE: [Failed, Pending, Succeeded]
        cmd: kubectl delete pods --all-namespaces --field-selector status.phase={{.ITEM.PHASE}} --ignore-not-found=true
      - for:
          matrix:
            PHASE: [successful]
        cmd: kubectl delete jobs --all-namespaces --field-selector status.{{.ITEM.PHASE}}=1 --ignore-not-found=true
    preconditions:
      - which kubectl

  # https://docs.github.com/en/enterprise-cloud@latest/actions/hosting-your-own-runners/managing-self-hosted-runners-with-actions-runner-controller/deploying-runner-scale-sets-with-actions-runner-controller#upgrading-arc
  upgrade-arc:
    desc: Upgrade the ARC
    cmds:
      - helm -n actions-runner-system uninstall home-ops-runner
      - sleep 5
      - helm -n actions-runner-system uninstall actions-runner-controller
      - sleep 5
      - flux -n actions-runner-system reconcile hr actions-runner-controller
      - flux -n actions-runner-system reconcile hr home-ops-runner
    preconditions:
      - which flux helm

  pvc-list:
    desc: List files on a PVC [REMOTE=<pvc>:<path>] [NS=default]
    summary: |
      List files and directories at a specific path on a PVC.

      REMOTE format: <pvc-name>[:<path>]
        - If no path is given, lists the root of the PVC

      Examples:
        task kubernetes:pvc-list REMOTE=ghost-laur NS=comm
        task kubernetes:pvc-list REMOTE=ghost-laur:/data/images NS=comm
    cmd: '{{.SCRIPTS_DIR}}/pvc-cp.sh list {{.REMOTE}} --namespace {{.NS}}'
    vars:
      NS: '{{.NS | default "default"}}'
    requires:
      vars: [REMOTE]
    preconditions:
      - test -f {{.SCRIPTS_DIR}}/pvc-cp.sh
      - which kubectl

  pvc-copy:
    desc: Copy local files to a PVC [LOCAL=<dir>] [REMOTE=<pvc>:<path>] [NS=default]
    summary: |
      Recursively copy files from a local directory to a path on a PVC,
      preserving the directory structure.

      Examples:
        task kubernetes:pvc-copy LOCAL=/tmp/images REMOTE=ghost-laur:/data/images NS=comm
        task kubernetes:pvc-copy LOCAL=./content REMOTE=forgejo:/data NS=development
    cmd: '{{.SCRIPTS_DIR}}/pvc-cp.sh copy {{.LOCAL}} {{.REMOTE}} --namespace {{.NS}}'
    vars:
      NS: '{{.NS | default "default"}}'
    requires:
      vars: [LOCAL, REMOTE]
    preconditions:
      - test -f {{.SCRIPTS_DIR}}/pvc-cp.sh
      - test -d {{.LOCAL}}
      - which kubectl

  pvc-chown:
    desc: Change ownership recursively on a PVC path [OWNER=uid:gid] [REMOTE=<pvc>:<path>] [NS=default]
    summary: |
      Recursively change the owner of files at a path on a PVC.

      OWNER format: <uid>[:<gid>]

      Examples:
        task kubernetes:pvc-chown OWNER=1000:1000 REMOTE=ghost-laur:/images NS=comm
        task kubernetes:pvc-chown OWNER=1000:1000 REMOTE=ghost-laur:/ NS=comm
    cmd: '{{.SCRIPTS_DIR}}/pvc-cp.sh chown {{.OWNER}} {{.REMOTE}} --namespace {{.NS}}'
    vars:
      NS: '{{.NS | default "default"}}'
    requires:
      vars: [OWNER, REMOTE]
    preconditions:
      - test -f {{.SCRIPTS_DIR}}/pvc-cp.sh
      - which kubectl

  delete-daemonset:
    desc: Restart daemonset pods to fix mis-scheduled daemonsets
    cmd: kubectl describe daemonsets.apps -A | grep '^Selector:.*{{.SET}}' | awk {'print $2'} | xargs -n1 -P999 kubectl delete pods -A -l
    requires:
      vars: [SET]
    preconditions:
      - which kubectl xargs

  reinit-app:
    desc: Reinitialize a Flux-managed app — suspend, delete all resources, resume and reconcile [APP=required] [NS=optional]
    cmd: '{{.SCRIPTS_DIR}}/reinit-app.sh {{.APP}} {{.NS}}'
    vars:
      NS: '{{.NS | default ""}}'
    requires:
      vars: [APP]
    preconditions:
      - test -f {{.SCRIPTS_DIR}}/reinit-app.sh
      - which kubectl flux
