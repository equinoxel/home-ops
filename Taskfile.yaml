---
version: '3'

set: [pipefail]
shopt: [globstar]

vars:
  BOOTSTRAP_DIR: '{{.ROOT_DIR}}/bootstrap'
  KUBERNETES_DIR: '{{.ROOT_DIR}}/kubernetes'
  SCRIPTS_DIR: '{{.ROOT_DIR}}/scripts'
  TALOS_DIR: '{{.ROOT_DIR}}/talos'
  PRIVATE_DIR: '{{.ROOT_DIR}}/.private'
  TALOSCONFIG: '{{.ROOT_DIR}}/talos/clusterconfig/talosconfig'

env:
  KUBECONFIG: '{{.ROOT_DIR}}/kubeconfig'
  SOPS_AGE_KEY_FILE: '{{.ROOT_DIR}}/age.key'
  TALOSCONFIG: '{{.TALOSCONFIG}}'

includes:
  bootstrap: .taskfiles/bootstrap
  talos: .taskfiles/talos
  tools: .taskfiles/tools
  kubernetes: .taskfiles/kubernetes
  volsync: .taskfiles/volsync

tasks:

  default: task --list

  reconcile:
    desc: Force Flux to pull in changes from your Git repository [APP=optional] [NS=flux-system]
    cmd: |
      {{if .APP}}
        flux --namespace {{.NS}} reconcile kustomization {{.APP}} --with-source
      {{else}}
        flux --namespace flux-system reconcile kustomization flux-system --with-source
      {{end}}
    vars:
      APP: '{{.APP | default ""}}'
      NS: '{{.NS | default "flux-system"}}'
    preconditions:
      - test -f {{.KUBECONFIG}}
      - which flux
